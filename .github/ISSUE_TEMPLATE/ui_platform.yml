name: UI or platform issue
description: Report layout, navigation, accessibility, focus, touch, keyboard, or platform-specific UI problems.
title: "[UI]: "
labels: ["ui"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iPhone
        - iPad
        - tvOS
        - Multiple platforms
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What happened?
      description: Describe the layout, navigation, focus, accessibility, or interaction issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include channel/source, orientation/window size, guide state, input device, and expected behavior.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Attach images or recordings if they help explain the issue.
