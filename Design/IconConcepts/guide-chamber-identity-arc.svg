      <use href="#seat-mid" transform="rotate(-12 512 704)"/>
      <use href="#seat-mid" transform="rotate(12 512 704)"/>
      <use href="#seat-mid" transform="rotate(34 512 704)"/>
      <use href="#seat-mid" transform="rotate(57 512 704)"/>
