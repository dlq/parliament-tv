    <rect id="seat-large" x="468" y="238" width="88" height="48" rx="15"/>
    <rect id="seat-mid" x="472" y="326" width="80" height="44" rx="14"/>
    <rect id="seat-small" x="478" y="414" width="68" height="38" rx="12"/>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <g fill="#f7eddc">
      <use href="#seat-large" transform="rotate(-62 512 704)"/>
